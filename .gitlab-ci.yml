# GitLab CI/CD Pipeline for Terminal Care
# Builds Docker image and pushes to GitLab Container Registry

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest

stages:
  - build
  - deploy

# Build Docker image
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  only:
    - main
    - master

# Deploy to server via SSH (optional)
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_SERVER >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_SERVER "
        cd /opt/terminal-care &&
        docker pull $DOCKER_IMAGE &&
        docker-compose down &&
        docker-compose up -d
      "
  only:
    - main
    - master
  when: manual  # 需要手动触发部署
